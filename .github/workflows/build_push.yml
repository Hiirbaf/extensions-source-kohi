name: CI

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!**.md'
      - '!.github/**'
      - '.github/scripts/**'
      - '.github/workflows/build_push.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  CI_CHUNK_SIZE: 288

jobs:
  prepare:
    name: Prepare job
    runs-on: ubuntu-latest
    outputs:
      individualMatrix: ${{ steps.generate-matrix.outputs.individualMatrix }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.TOKEN_GITHUB }}

      # Obtener el último commit exitoso de CI
      - name: Get last successful CI commit
        id: last-ci
        uses: nrwl/nx-set-shas@v4.4.0
        with:
          fallback-sha: HEAD~1

      # Detectar archivos modificados respecto a ese commit
      - name: Detect modified modules
        id: modified-modules
        run: |
          git fetch origin main --depth=1
          MODIFIED=$(git diff --name-only ${{ steps.last-ci.outputs.base-sha }} HEAD | grep '^src/' || true)
          echo "modified=$MODIFIED" >> $GITHUB_OUTPUT

      # Bump versions para libs modificadas
      - name: Bump extensions that use modified libs
        if: steps.modified-modules.outputs.modified != ''
        run: |
          chmod +x ./.github/scripts/bump-versions.py
          ./.github/scripts/bump-versions.py ${{ steps.modified-modules.outputs.modified }}

      # Crear matriz de builds solo para los módulos modificados
      - id: generate-matrix
        name: Create matrix for modified modules
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = process.env.modified?.split("\n").filter(f => f) || [];
            const modules = [...new Set(changedFiles.map(f => f.split("/").slice(0,2).join("/")))];
            console.log(`Modules to build: ${modules}`);
            core.setOutput('individualMatrix', JSON.stringify({ module: modules }));

  build_individual:
    name: Build individual modules
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.individualMatrix) }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.TOKEN_GITHUB }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Prepare signing key
        run: |
          echo ${{ secrets.SIGNING_KEY }} | base64 -d > signingkey.jks

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore build cache
        uses: actions/cache/restore@v3
        with:
          path: |
            src/**/build
            !src/**/build/outputs
          key: build-cache-${{ github.sha }}-${{ matrix.module }}
          restore-keys: |
            build-cache-${{ github.sha }}-
            build-cache-

      - name: Build extension
        run: chmod +x ./gradlew && ./gradlew -p ${{ matrix.module }} assembleRelease
        env:
          CI_CHUNK_NUM: ${{ matrix.module }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Store build cache
        uses: actions/cache/save@v3
        with:
          path: |
            src/**/build
            !src/**/build/outputs
          key: build-cache-${{ github.sha }}-${{ matrix.module }}

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        if: ${{ github.repository == 'hiirbaf/extensions-source-kohi' }}
        with:
          name: "individual-apks-${{ matrix.module }}"
          path: "**/*.apk"
          retention-days: 1

      - name: Clean up CI files
        run: rm signingkey.jks

  publish_repo:
    name: Publish repo
    needs: build_individual
    if: ${{ github.repository == 'hiirbaf/extensions-source-kohi' }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup rsync
        run: |
          sudo apt-get update && sudo apt install rsync -y

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: ~/apk-artifacts

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main
          token: ${{ secrets.TOKEN_GITHUB }}

      - name: Create repo artifacts
        run: |
          cd main
          python ./.github/scripts/move-apks.py
          INSPECTOR_LINK="$(curl -s "https://api.github.com/repos/aniyomiorg/aniyomi-extensions-inspector/releases/latest" | jq -r '.assets[0].browser_download_url')"
          curl -L "$INSPECTOR_LINK" -o ./Inspector.jar
          java -jar ./Inspector.jar "repo/apk" "output.json" "tmp"
          python ./.github/scripts/create-repo.py    

      - name: Checkout repo branch
        uses: actions/checkout@v4
        with:
          repository: hiirbaf/extensions-source-kohi
          token: ${{ secrets.TOKEN_GITHUB }}
          ref: main
          path: repo

      - name: Set Forgejo remote URL
        run: |
          cd repo
          git remote set-url origin https://${{ secrets.FORGEJO_USERNAME }}:${{ secrets.FORGEJO_TOKEN }}@kohiden.xyz/Kohi-den/extensions.git

      - name: Pull latest changes
        run: |
          cd repo
          git pull --rebase origin main    

      - name: Sync repo
        run: |
          rsync -a --delete --exclude .git --exclude .gitignore main/repo/ repo --exclude README.md --exclude repo.json

      - name: Increase buffer size
        run: git config --global http.postBuffer 157286400

      - name: Deploy repo
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update extensions repo"
          cwd: "./repo"
          committer_name: Kohi-den-bot
          committer_email: kohi-den-bot@noreply.localhost
