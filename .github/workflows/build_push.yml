name: CI

on:
  push:
    branches:
      - '**'  # cualquier rama
    paths:
      - '**'
      - '!**.md'
      - '!.github/**'
      - '.github/scripts/**'
      - '.github/workflows/build_push.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  CI_CHUNK_SIZE: 288

jobs:
  prepare:
    name: Prepare job
    runs-on: ubuntu-latest
    outputs:
      individualMatrix: ${{ steps.generate-matrices.outputs.individualMatrix }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.TOKEN_GITHUB }}

      - name: Get last modified extension
        id: last-mod
        run: |
          files=$(git diff --name-only HEAD~1 HEAD | grep '^src/')
          if [ -z "$files" ]; then
            echo "No changed modules"
            echo "LAST_MODULE="
            exit 0
          fi
          first_file=$(echo "$files" | head -n1)
          module=$(echo $first_file | cut -d/ -f2,3)
          echo "LAST_MODULE=$module" >> "$GITHUB_ENV"
          echo "Last modified module: $module"

      - id: generate-matrices
        name: Create output matrix
        uses: actions/github-script@v7
        with:
          script: |
            core.setOutput('individualMatrix', JSON.stringify({ 'chunk': [0] }))

  build_individual:
    name: Build last modified extension
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.individualMatrix) }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.TOKEN_GITHUB }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore build cache
        uses: actions/cache/restore@v3
        with:
          path: |
            src/**/build
            !src/**/build/outputs
          key: build-cache-${{ github.sha }}-${{ matrix.chunk }}
          restore-keys: |
            build-cache-${{ github.sha }}-
            build-cache-

      - name: Build last modified extension
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$LAST_MODULE" ]; then
            echo "No modules changed, skipping build"
            exit 0
          fi
          echo "Building module: $LAST_MODULE"
          chmod +x ./gradlew
          ./gradlew -p src $LAST_MODULE:assembleRelease

      - name: Store build cache
        uses: actions/cache/save@v3
        with:
          path: |
            src/**/build
            !src/**/build/outputs
          key: build-cache-${{ github.sha }}-${{ matrix.chunk }}

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        if: ${{ github.repository == 'hiirbaf/extensions-source-kohi' }}
        with:
          name: "individual-apks-${{ matrix.chunk }}"
          path: "**/*.apk"
          retention-days: 1

      - name: Clean up CI files
        run: rm signingkey.jks

  publish_repo:
    name: Publish repo
    needs:
      - build_individual
    if: ${{ github.repository == 'hiirbaf/extensions-source-kohi' }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup rsync
        run: sudo apt-get update && sudo apt install rsync -y

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: ~/apk-artifacts

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}  # funciona en cualquier rama
          path: main
          token: ${{ secrets.TOKEN_GITHUB }}

      - name: Create repo artifacts
        run: |
          cd main
          python ./.github/scripts/move-apks.py
          INSPECTOR_LINK="$(curl -s "https://api.github.com/repos/aniyomiorg/aniyomi-extensions-inspector/releases/latest" | jq -r '.assets[0].browser_download_url')"
          curl -L "$INSPECTOR_LINK" -o ./Inspector.jar
          java -jar ./Inspector.jar "repo/apk" "output.json" "tmp"
          python ./.github/scripts/create-repo.py

      - name: Checkout repo branch
        uses: actions/checkout@v4
        with:
          repository: hiirbaf/extensions-source-kohi
          token: ${{ secrets.TOKEN_GITHUB }}
          ref: ${{ github.ref_name }}  # publica en la misma rama
          path: repo

      - name: Set Forgejo remote URL
        run: |
          cd repo
          git remote set-url origin https://${{ secrets.FORGEJO_USERNAME }}:${{ secrets.FORGEJO_TOKEN }}@kohiden.xyz/Kohi-den/extensions.git

      - name: Pull latest changes
        run: |
          cd repo
          git pull --rebase origin ${{ github.ref_name }}

      - name: Sync repo
        run: |
          rsync -a --delete --exclude .git --exclude .gitignore main/repo/ repo --exclude README.md --exclude repo.json

      - name: Increase buffer size
        run: git config --global http.postBuffer 157286400

      - name: Deploy repo
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update extensions repo"
          cwd: "./repo"
          committer_name: Kohi-den-bot
          committer_email: kohi-den-bot@noreply.localhost
