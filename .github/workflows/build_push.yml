name: CI

on:
  workflow_dispatch:
    inputs:
      reference_branch:
        description: 'Branch to compare changes against'
        default: 'develop'
        required: true

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare job
    runs-on: ubuntu-latest
    outputs:
      modifiedModules: ${{ steps.detect-modules.outputs.modifiedModules }}
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          fetch-depth: 0  # necesitamos todo el historial para git diff

      - name: Detect modified modules
        id: detect-modules
        run: |
          REF_BRANCH="${{ github.event.inputs.reference_branch }}"
          echo "Comparing $(git rev-parse HEAD) with $REF_BRANCH..."
          git fetch origin $REF_BRANCH --depth=1
          MODIFIED=$(git diff --name-only origin/$REF_BRANCH HEAD | grep '^src/' || true)
          MODULES=$(echo "$MODIFIED" | cut -d'/' -f1,2 | sort -u | tr '\n' ' ')
          echo "Modified modules: $MODULES"
          echo "modifiedModules=$MODULES" >> $GITHUB_OUTPUT

  build_individual:
    name: Build modified extensions
    needs: prepare
    runs-on: ubuntu-latest
    if: ${{ needs.prepare.outputs.modifiedModules != '' }}
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Prepare signing key
        run: echo ${{ secrets.SIGNING_KEY }} | base64 -d > signingkey.jks

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore build cache
        uses: actions/cache/restore@v3
        with:
          path: |
            src/**/build
            !src/**/build/outputs
          key: build-cache-${{ github.sha }}

      - name: Build modified extensions
        run: |
          for module in ${{ needs.prepare.outputs.modifiedModules }}; do
            echo "Building $module..."
            chmod +x ./gradlew
            ./gradlew -p $module assembleRelease
          done
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Store build cache
        uses: actions/cache/save@v3
        with:
          path: |
            src/**/build
            !src/**/build/outputs
          key: build-cache-${{ github.sha }}

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: "modified-apks"
          path: "**/*.apk"
          retention-days: 1

      - name: Clean up CI files
        run: rm signingkey.jks

  publish_repo:
    name: Publish repo
    needs: build_individual
    if: ${{ github.repository == 'hiirbaf/extensions-source-kohi' }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup rsync
        run: sudo apt-get update && sudo apt install rsync -y

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: ~/apk-artifacts

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          fetch-depth: 0
          path: main

      - name: Create repo artifacts
        run: |
          cd main
          python ./.github/scripts/move-apks.py
          INSPECTOR_LINK="$(curl -s "https://api.github.com/repos/aniyomiorg/aniyomi-extensions-inspector/releases/latest" | jq -r '.assets[0].browser_download_url')"
          curl -L "$INSPECTOR_LINK" -o ./Inspector.jar
          java -jar ./Inspector.jar "repo/apk" "output.json" "tmp"
          python ./.github/scripts/create-repo.py    

      - name: Checkout repo branch
        uses: actions/checkout@v4
        with:
          repository: hiirbaf/extensions-source-kohi
          token: ${{ secrets.FORGEJO_TOKEN }}
          ref: main
          path: repo

      - name: Set Forgejo remote URL
        run: |
          cd repo
          git remote set-url origin https://${{ secrets.FORGEJO_USERNAME }}:${{ secrets.FORGEJO_TOKEN }}@kohiden.xyz/Kohi-den/extensions.git

      - name: Pull latest changes
        run: |
          cd repo
          git pull --rebase origin main    

      - name: Sync repo
        run: |
          rsync -a --delete --exclude .git --exclude .gitignore main/repo/ repo --exclude README.md --exclude repo.json

      - name: Increase buffer size
        run: git config --global http.postBuffer 157286400

      - name: Deploy repo
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update extensions repo"
          cwd: "./repo"
          committer_name: Kohi-den-bot
          committer_email: kohi-den-bot@noreply.localhost
